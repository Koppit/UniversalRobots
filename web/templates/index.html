<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Vision – Kontrollpanel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 0.02em;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #374151;
      transition: background 0.3s;
    }
    .dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.busy    { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
    .dot.error   { background: #ef4444; box-shadow: 0 0 6px #ef444488; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
    }

    /* ── Feed panels ── */
    .feed-panel {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .feed-panel .panel-header {
      background: #252840;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-header .badge {
      background: #312e81;
      color: #a5b4fc;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .panel-header .badge.scan { background: #14532d; color: #86efac; }
    .feed-img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0c14;
      min-height: 360px;
    }
    .feed-img-wrap img {
      max-width: 100%;
      max-height: 480px;
      display: block;
      object-fit: contain;
    }
    .placeholder {
      color: #374151;
      font-size: 13px;
      text-align: center;
    }
    .placeholder svg {
      display: block;
      margin: 0 auto 8px;
      opacity: 0.3;
    }

    /* ── Control panel (spans both columns) ── */
    .control-panel {
      grid-column: 1 / -1;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 220px;
    }
    .ctrl-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    /* ── Buttons ── */
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:active:not(:disabled) { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #0e7490; color: #fff; }
    .btn-success  { background: #16a34a; color: #fff; }
    .btn-danger   { background: #dc2626; color: #fff; }
    .btn-neutral  { background: #334155; color: #e2e8f0; }

    /* ── Divider ── */
    .ctrl-divider {
      width: 1px;
      background: #2d3148;
      align-self: stretch;
      margin: 0 4px;
    }

    /* ── Calibration panel ── */
    .calib-panel {
      grid-column: 1 / -1;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 8px;
      overflow: hidden;
    }
    .calib-toggle {
      width: 100%;
      background: #252840;
      border: none;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calib-toggle:hover { background: #2e3257; }
    .calib-body {
      display: none;
      padding: 14px;
      gap: 14px;
      align-items: flex-start;
    }
    .calib-body.open { display: flex; flex-wrap: wrap; }
    .calib-preview-wrap {
      flex: 0 0 auto;
      width: 320px;
      height: 180px;
      background: #0a0c14;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calib-preview-wrap img { max-width: 100%; max-height: 100%; display: block; }
    .calib-controls { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
    .marker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .marker-chip {
      border-radius: 5px;
      padding: 4px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      background: #1e293b;
      color: #475569;
      transition: background 0.2s, color 0.2s;
    }
    .marker-chip.found   { background: #14532d; color: #86efac; }
    .marker-chip.missing { background: #450a0a; color: #fca5a5; }
    #calib-result {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 5px;
      background: #0f172a;
      color: #64748b;
      min-height: 32px;
    }
    #calib-result.ok  { background: #14532d22; color: #86efac; }
    #calib-result.err { background: #450a0a22; color: #fca5a5; }

    /* ── Status bar ── */
    footer {
      background: #1a1d2e;
      border-top: 1px solid #2d3148;
      padding: 8px 20px;
      font-size: 12px;
      color: #64748b;
      display: flex;
      justify-content: space-between;
    }
    #status-text { color: #94a3b8; }

    /* ── Detection list ── */
    #detection-list {
      list-style: none;
      font-size: 12px;
      color: #94a3b8;
      max-height: 120px;
      overflow-y: auto;
      min-width: 220px;
    }
    #detection-list li {
      padding: 3px 0;
      border-bottom: 1px solid #1e293b;
    }
    #detection-list li:last-child { border-bottom: none; }
    #detection-list .det-label { color: #e2e8f0; font-weight: 500; }
    #detection-list .det-pos   { color: #64748b; }
  </style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1>Robot Vision – Kontrollpanel</h1>
</header>

<main>
  <!-- Live feed -->
  <div class="feed-panel">
    <div class="panel-header">
      Live-kamerafeed
      <div style="display:flex;gap:8px;align-items:center">
        <button id="btn-overlay" onclick="toggleCalibOverlay()"
          style="background:#1e293b;border:1px solid #334155;color:#94a3b8;
                 font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;
                 font-weight:600;letter-spacing:.04em">
          Vis kalibrering
        </button>
        <button id="btn-mask" onclick="toggleWorkspaceMask()"
          style="background:#1e293b;border:1px solid #334155;color:#94a3b8;
                 font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;
                 font-weight:600;letter-spacing:.04em">
          Masker område
        </button>
      </div>
    </div>
    <div class="feed-img-wrap">
      <img id="live-img" src="/stream" alt="Live feed">
    </div>
  </div>

  <!-- Captured / analyzed image -->
  <div class="feed-panel">
    <div class="panel-header">
      Siste analyse
      <span class="badge" id="mode-badge"></span>
    </div>
    <div class="feed-img-wrap" id="capture-wrap">
      <div class="placeholder" id="capture-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/>
          <path d="M3 9h2M3 15h2M19 9h2M19 15h2M9 3v2M15 3v2M9 19v2M15 19v2"/>
        </svg>
        Ingen analyse kjørt ennå
      </div>
      <img id="capture-img" src="" alt="Siste analyse" style="display:none">
    </div>
  </div>

  <!-- Controls -->
  <div class="control-panel">

    <!-- Single-shot -->
    <div class="ctrl-group">
      <label>Enkeltbilde-analyse</label>
      <button class="btn btn-primary" id="btn-bbox" onclick="analyze('bbox')">
        Bounding Boxes
      </button>
      <button class="btn btn-secondary" id="btn-gc" onclick="analyze('grabcut')">
        Kontur-segmentering (GrabCut)
      </button>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Detection results -->
    <div class="ctrl-group" style="flex: 1">
      <label>Gjenkjente objekter (<span id="det-count">0</span>)</label>
      <ul id="detection-list"></ul>
    </div>

  </div>
</main>

  <!-- Calibration panel -->
  <div class="calib-panel">
    <button class="calib-toggle" onclick="toggleCalib(this)">
      <span>Kalibrering (ArUco)</span>
      <span id="calib-toggle-arrow">▲</span>
    </button>
    <div class="calib-body open" id="calib-body">
      <div class="calib-preview-wrap">
        <img id="calib-img" src="" alt="Markør-preview">
      </div>
      <div class="calib-controls">
        <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#64748b">
          Markørstatus
        </label>
        <div class="marker-grid" id="marker-grid">
          <div class="marker-chip" id="chip-1">ID 1</div>
          <div class="marker-chip" id="chip-2">ID 2</div>
          <div class="marker-chip" id="chip-3">ID 3</div>
          <div class="marker-chip" id="chip-4">ID 4</div>
        </div>
        <button class="btn btn-primary" id="btn-calib" onclick="runCalibration()" style="width:100%">
          Kalibrer nå
        </button>
        <div id="calib-result">Åpne panelet for å sjekke markørstatus.</div>
      </div>
    </div>
  </div>

<footer>
  <span id="status-text">Initialiserer…</span>
  <span id="clock"></span>
</footer>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let captureVersion = 0;

  // ── API helpers ───────────────────────────────────────────────────────────
  async function post(url, body = {}) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return r.json();
  }

  // ── Analyze ───────────────────────────────────────────────────────────────
  async function analyze(mode) {
    setButtons(false);
    setStatus('Sender til Gemini…');
    try {
      const data = await post('/api/analyze', { mode });
      if (data.error) { setStatus('Feil: ' + data.error); return; }
      const label = mode === 'grabcut' ? 'GrabCut' : 'Bounding Boxes';
      document.getElementById('mode-badge').textContent = label;
      refreshCapture();
      showDetections(data.detections || []);
      setStatus(`${data.count} objekt(er) funnet.`);
    } catch (e) {
      setStatus('Nettverksfeil: ' + e.message);
    } finally {
      setButtons(true);
    }
  }

  // ── Refresh captured image ────────────────────────────────────────────────
  function refreshCapture() {
    captureVersion++;
    const img = document.getElementById('capture-img');
    const ph  = document.getElementById('capture-placeholder');
    img.src = '/api/last_capture?v=' + captureVersion;
    img.style.display = '';
    ph.style.display  = 'none';
  }

  // ── Detections list ───────────────────────────────────────────────────────
  function showDetections(dets) {
    const ul = document.getElementById('detection-list');
    document.getElementById('det-count').textContent = dets.length;
    ul.innerHTML = '';
    dets.forEach((d, i) => {
      const box = d.box_2d || [0,0,0,0];
      const nx = Math.round((box[1] + box[3]) / 2);
      const ny = Math.round((box[0] + box[2]) / 2);
      const li = document.createElement('li');
      li.innerHTML = `<span class="det-label">${i+1}. ${d.label || '?'}</span>
                      <span class="det-pos"> — X=${nx} Y=${ny}</span>`;
      ul.appendChild(li);
    });
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(msg) {
    document.getElementById('status-text').textContent = msg;
  }

  function setButtons(enabled) {
    ['btn-bbox','btn-gc'].forEach(id => {
      document.getElementById(id).disabled = !enabled;
    });
  }

  function setDot(state) {  // 'online' | 'busy' | 'error' | ''
    const dot = document.getElementById('status-dot');
    dot.className = 'dot ' + state;
  }

  // ── Status polling ────────────────────────────────────────────────────────
  async function pollStatus() {
    try {
      const s = await fetch('/api/status').then(r => r.json());
      setStatus(s.msg);
      setDot(s.busy ? 'busy' : 'online');
    } catch (_) {
      setDot('error');
      setStatus('Kan ikke nå serveren.');
    }
  }

  // ── Clock ─────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ── Calibration overlay toggle ────────────────────────────────────────────
  let overlayOn = false;
  async function toggleCalibOverlay() {
    const data = await post('/api/calibrate/overlay');
    overlayOn = data.overlay;
    const btn = document.getElementById('btn-overlay');
    btn.textContent = overlayOn ? 'Skjul kalibrering' : 'Vis kalibrering';
    btn.style.background    = overlayOn ? '#1e3a5f' : '#1e293b';
    btn.style.color         = overlayOn ? '#7dd3fc' : '#94a3b8';
    btn.style.borderColor   = overlayOn ? '#3b82f6' : '#334155';
  }

  // ── Workspace mask toggle ─────────────────────────────────────────────────
  let maskOn = false;
  async function toggleWorkspaceMask() {
    const data = await post('/api/workspace/toggle');
    maskOn = data.mask;
    const btn = document.getElementById('btn-mask');
    btn.textContent    = maskOn ? 'Masker PÅ' : 'Masker område';
    btn.style.background  = maskOn ? '#1c1917' : '#1e293b';
    btn.style.color       = maskOn ? '#fbbf24' : '#94a3b8';
    btn.style.borderColor = maskOn ? '#78350f' : '#334155';
  }

  // ── Calibration panel ─────────────────────────────────────────────────────
  let calibOpen = true;
  let calibPollTimer = null;

  function toggleCalib(btn) {
    calibOpen = !calibOpen;
    document.getElementById('calib-body').classList.toggle('open', calibOpen);
    document.getElementById('calib-toggle-arrow').textContent = calibOpen ? '▲' : '▼';
    if (calibOpen) {
      refreshCalibPreview();
      calibPollTimer = setInterval(() => { refreshCalibPreview(); pollCalibStatus(); }, 1000);
    } else {
      clearInterval(calibPollTimer);
    }
  }

  function refreshCalibPreview() {
    const img = document.getElementById('calib-img');
    img.src = '/api/calibrate/preview?v=' + Date.now();
  }

  async function pollCalibStatus() {
    try {
      const s = await fetch('/api/calibrate/status').then(r => r.json());
      if (s.error) return;
      const needed = s.needed || [0, 1, 2, 3];
      const found  = new Set(s.detected || []);
      needed.forEach(id => {
        const chip = document.getElementById('chip-' + id);
        if (!chip) return;
        chip.className = 'marker-chip ' + (found.has(id) ? 'found' : 'missing');
      });
      const res = document.getElementById('calib-result');
      if (s.calibrated) {
        res.className = 'ok';
        res.textContent = 'Kalibrert. ' + found.size + '/' + needed.length + ' markorer synlige.';
      } else {
        res.className = '';
        res.textContent = found.size + '/' + needed.length + ' markorer funnet – trykk "Kalibrer nå".';
      }
    } catch (_) {}
  }

  async function runCalibration() {
    const btn = document.getElementById('btn-calib');
    const res = document.getElementById('calib-result');
    btn.disabled = true;
    res.className = '';
    res.textContent = 'Kalibrerer…';
    try {
      const data = await post('/api/calibrate/run');
      if (data.success) {
        res.className = 'ok';
        res.textContent = 'Kalibrering fullfort! Markorer brukt: ' + data.markers_used.join(', ');
      } else {
        res.className = 'err';
        res.textContent = data.error || 'Kalibrering feilet.';
      }
    } catch (e) {
      res.className = 'err';
      res.textContent = 'Nettverksfeil: ' + e.message;
    } finally {
      btn.disabled = false;
      refreshCalibPreview();
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  setInterval(pollStatus, 1500);
  setInterval(updateClock, 1000);
  pollStatus();
  updateClock();
  // Calibration panel starts open
  refreshCalibPreview();
  pollCalibStatus();
  calibPollTimer = setInterval(() => { refreshCalibPreview(); pollCalibStatus(); }, 1000);
</script>
</body>
</html>
